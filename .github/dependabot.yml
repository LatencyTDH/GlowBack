version: 2
updates:
  # Rust dependencies (Cargo.toml and Cargo.lock)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      # arrow + parquet are version-locked in practice (parquet N requires arrow N).
      # Group them together across ALL update types (including major) so a major
      # bump like parquet 55 -> 59 always moves arrow in lockstep instead of
      # splitting into separate PRs that can't compile. Listed first so it wins
      # over the general cargo group below.
      arrow-ecosystem:
        patterns:
          - "arrow*"
          - "parquet*"
        update-types:
          - "major"
          - "minor"
          - "patch"
      cargo:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"
      - "no-docs"

  # Python dependencies in the UI directory (covers pyproject.toml + requirements.txt)
  - package-ecosystem: "pip"
    directory: "/ui"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    groups:
      ui-python:
        update-types:
          - "minor"
          - "patch"
    reviewers:
      - "sd"
    assignees:
      - "sd"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
      - "no-docs"

  # GitHub Actions (if you add any in the future)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
      - "no-docs"
