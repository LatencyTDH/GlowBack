name: Rust Build Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - "crates/**"
      - "api/**"
      - "ui/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"
      - ".github/workflows/release.yml"
      - "scripts/package-engine-release.sh"
  pull_request:
    branches: [ "main" ]
    paths:
      - "crates/**"
      - "api/**"
      - "ui/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"
      - ".github/workflows/release.yml"
      - "scripts/package-engine-release.sh"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      full_workspace:
        description: "Run full workspace build/tests"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  CARGO_TERM_COLOR: always
  RELEASE_ARTIFACT_NAME: glowback-engine-linux-x86_64

jobs:
  changes:
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.full_workspace == 'true')
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.set-matrix.outputs.crates }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            common:
              - Cargo.toml
              - Cargo.lock
              - .github/workflows/rust.yml
              - .github/workflows/release.yml
              - scripts/package-engine-release.sh
            gb-engine:
              - crates/gb-engine/**
            gb-data:
              - crates/gb-data/**
            gb-types:
              - crates/gb-types/**
            gb-python:
              - crates/gb-python/**
            gb-options:
              - crates/gb-options/**
            gb-optimizer:
              - crates/gb-optimizer/**
            gb-risk:
              - crates/gb-risk/**
            gb-live:
              - crates/gb-live/**
      - id: set-matrix
        run: |
          all_crates='["gb-engine","gb-data","gb-types","gb-options","gb-optimizer","gb-python","gb-risk","gb-live"]'

          if [[ "${{ steps.filter.outputs.common }}" == "true" ]]; then
            echo "crates=$all_crates" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gb_engine="${{ steps.filter.outputs.gb-engine }}"
          gb_data="${{ steps.filter.outputs.gb-data }}"
          gb_types="${{ steps.filter.outputs.gb-types }}"
          gb_python="${{ steps.filter.outputs.gb-python }}"
          gb_options="${{ steps.filter.outputs.gb-options }}"
          gb_optimizer="${{ steps.filter.outputs.gb-optimizer }}"
          gb_risk="${{ steps.filter.outputs.gb-risk }}"
          gb_live="${{ steps.filter.outputs.gb-live }}"

          crates=()
          [[ "$gb_engine" == "true" ]] && crates+=("gb-engine")
          [[ "$gb_data" == "true" ]] && crates+=("gb-data")
          [[ "$gb_types" == "true" ]] && crates+=("gb-types")
          [[ "$gb_options" == "true" ]] && crates+=("gb-options")
          [[ "$gb_optimizer" == "true" ]] && crates+=("gb-optimizer")
          [[ "$gb_python" == "true" ]] && crates+=("gb-python")
          [[ "$gb_risk" == "true" ]] && crates+=("gb-risk")
          [[ "$gb_live" == "true" ]] && crates+=("gb-live")

          if [ ${#crates[@]} -eq 0 ]; then
            echo 'crates=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          json="["
          for c in "${crates[@]}"; do
            json+="\"$c\","
          done
          json=${json%,}
          json+="]"
          echo "crates=$json" >> "$GITHUB_OUTPUT"

  test:
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.full_workspace == 'true') && needs.changes.outputs.crates != '[]'
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.changes.outputs.crates) }}
    name: Rust / ${{ matrix.crate }}
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Build (crate)
        run: cargo build -p ${{ matrix.crate }} --locked --verbose
      - name: Run tests (crate)
        run: cargo test -p ${{ matrix.crate }} --locked --verbose

  full-workspace:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full_workspace == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Build (workspace)
        run: cargo build --workspace --locked --verbose
      - name: Run tests (workspace)
        run: cargo test --workspace --locked --verbose

  python-check:
    runs-on: ubuntu-latest
    name: Python / api + ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            api/requirements.txt
            ui/requirements.txt
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r api/requirements.txt -r ui/requirements.txt httpx
      - name: Compile Python surfaces
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m compileall api ui
      - name: Run API tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m unittest discover -s api/tests -v
      - name: Run UI tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m unittest discover -s ui/tests -v

  release-artifact:
    name: Build release artifact
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      github.event_name != 'schedule' &&
      needs.python-check.result == 'success' &&
      (needs.test.result == 'success' || needs.full-workspace.result == 'success')
    runs-on: ubuntu-latest
    needs:
      - test
      - full-workspace
      - python-check
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Build release binary
        run: cargo build -p gb-engine --bin gb-engine-service --release --locked --verbose
      - name: Package release bundle
        run: ./scripts/package-engine-release.sh dist
      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.RELEASE_ARTIFACT_NAME }}
          path: |
            dist/${{ env.RELEASE_ARTIFACT_NAME }}.tar.gz
            dist/${{ env.RELEASE_ARTIFACT_NAME }}.tar.gz.sha256
            dist/${{ env.RELEASE_ARTIFACT_NAME }}.metadata.json
          if-no-files-found: error
          retention-days: 30
      - name: Summarize release artifact
        run: |
          {
            echo "### Release artifact"
            echo
            echo "- Artifact: \`${RELEASE_ARTIFACT_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Assets:"
            echo "  - \`${RELEASE_ARTIFACT_NAME}.tar.gz\`"
            echo "  - \`${RELEASE_ARTIFACT_NAME}.tar.gz.sha256\`"
            echo "  - \`${RELEASE_ARTIFACT_NAME}.metadata.json\`"
          } >> "$GITHUB_STEP_SUMMARY"
