name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (for example v0.2.0)"
        required: true
        type: string
      release_name:
        description: "Optional release title (defaults to the tag)"
        required: false
        type: string
      run_id:
        description: "Optional rust.yml run ID to publish from"
        required: false
        type: string
      artifact_name:
        description: "Artifact name to publish from the selected run"
        required: false
        default: glowback-engine-linux-x86_64
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean
      notes:
        description: "Optional release notes. Leave blank to auto-generate notes."
        required: false
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: manual-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: main
      DEFAULT_WORKFLOW: rust.yml
      DEFAULT_WORKFLOW_PATH: .github/workflows/rust.yml
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Resolve source run
        id: resolve
        env:
          INPUT_ARTIFACT_NAME: ${{ inputs.artifact_name }}
          INPUT_RUN_ID: ${{ inputs.run_id }}
          POLL_INTERVAL_SECONDS: 15
          RESOLVE_TIMEOUT_SECONDS: 1800
        run: |
          set -euo pipefail

          artifact_name="${INPUT_ARTIFACT_NAME}"
          requested_run_id="${INPUT_RUN_ID}"
          run_id="${requested_run_id}"

          artifact_id_for_run() {
            local run_id="$1"
            local artifact_name="$2"

            gh api "/repos/${REPO}/actions/runs/${run_id}/artifacts?per_page=100" \
              | jq -r --arg artifact_name "${artifact_name}" '.artifacts[]
                  | select(.name == $artifact_name and .expired == false)
                  | .id' \
              | head -n 1
          }

          load_run_json() {
            local run_id="$1"
            gh api "/repos/${REPO}/actions/runs/${run_id}"
          }

          load_target_run_json() {
            local target_sha="$1"

            gh api "/repos/${REPO}/actions/workflows/${DEFAULT_WORKFLOW}/runs?branch=${DEFAULT_BRANCH}&per_page=100" \
              | jq -cer --arg target_sha "${target_sha}" --arg workflow_path "${DEFAULT_WORKFLOW_PATH}" '
                  [.workflow_runs[]
                    | select(.head_sha == $target_sha)
                    | select(.path == $workflow_path)
                    | select(.event == "push" or .event == "workflow_dispatch")
                  ]
                  | sort_by(.created_at)
                  | reverse
                  | ((map(select(.event == "push"))) + (map(select(.event == "workflow_dispatch"))))
                  | .[0]'
          }

          resolve_target_sha() {
            gh api "/repos/${REPO}/branches/${DEFAULT_BRANCH}" --jq '.commit.sha'
          }

          target_sha=""
          if [[ -z "${requested_run_id}" ]]; then
            target_sha="$(resolve_target_sha)"
            echo "Resolving release artifact from ${REPO}@${DEFAULT_BRANCH} (${target_sha})"
          else
            echo "Resolving release artifact from explicit run ${requested_run_id}"
          fi

          deadline=$(( $(date +%s) + RESOLVE_TIMEOUT_SECONDS ))

          while true; do
            if [[ -n "${requested_run_id}" ]]; then
              run_json="$(load_run_json "${run_id}")"
            else
              run_json="$(load_target_run_json "${target_sha}" || true)"
              if [[ -n "${run_json}" ]]; then
                run_id="$(jq -r '.id' <<<"${run_json}")"
              else
                echo "No ${DEFAULT_WORKFLOW} run exists yet for ${REPO}@${DEFAULT_BRANCH} (${target_sha}); waiting ${POLL_INTERVAL_SECONDS}s..."
              fi
            fi

            if [[ -n "${run_json:-}" ]]; then
              workflow_path="$(jq -r '.path' <<<"${run_json}")"
              head_sha="$(jq -r '.head_sha' <<<"${run_json}")"
              head_branch="$(jq -r '.head_branch' <<<"${run_json}")"
              event_name="$(jq -r '.event' <<<"${run_json}")"
              run_status="$(jq -r '.status' <<<"${run_json}")"
              run_conclusion="$(jq -r '.conclusion // ""' <<<"${run_json}")"
              run_url="$(jq -r '.html_url' <<<"${run_json}")"
              repository_name="$(jq -r '.repository.full_name' <<<"${run_json}")"
              head_repository_name="$(jq -r '.head_repository.full_name // empty' <<<"${run_json}")"

              if [[ "${repository_name}" != "${REPO}" ]]; then
                echo "Run ${run_id} belongs to repository '${repository_name}', expected '${REPO}'." >&2
                exit 1
              fi

              if [[ "${workflow_path}" != "${DEFAULT_WORKFLOW_PATH}" ]]; then
                echo "Run ${run_id} came from workflow path '${workflow_path}', expected '${DEFAULT_WORKFLOW_PATH}'." >&2
                exit 1
              fi

              if [[ "${head_branch}" != "${DEFAULT_BRANCH}" ]]; then
                echo "Run ${run_id} is on branch '${head_branch}', but releases must come from ${DEFAULT_BRANCH}." >&2
                exit 1
              fi

              if [[ "${event_name}" != "push" && "${event_name}" != "workflow_dispatch" ]]; then
                echo "Run ${run_id} came from event '${event_name}', but releases only accept push or workflow_dispatch builds." >&2
                exit 1
              fi

              if [[ -n "${head_repository_name}" && "${head_repository_name}" != "${REPO}" ]]; then
                echo "Run ${run_id} came from head repository '${head_repository_name}', but releases must use upstream main builds from ${REPO}." >&2
                exit 1
              fi

              if [[ -z "${requested_run_id}" && "${head_sha}" != "${target_sha}" ]]; then
                echo "Resolved run ${run_id} for commit '${head_sha}', but expected '${target_sha}'." >&2
                exit 1
              fi

              if [[ "${run_status}" == "completed" ]]; then
                if [[ "${run_conclusion}" != "success" ]]; then
                  echo "Run ${run_id} completed with conclusion '${run_conclusion}' and cannot be released." >&2
                  exit 1
                fi

                artifact_id="$(artifact_id_for_run "${run_id}" "${artifact_name}" || true)"
                if [[ -n "${artifact_id}" ]]; then
                  {
                    echo "artifact_id=${artifact_id}"
                    echo "artifact_name=${artifact_name}"
                    echo "head_sha=${head_sha}"
                    echo "run_id=${run_id}"
                    echo "run_url=${run_url}"
                  } >> "$GITHUB_OUTPUT"
                  break
                fi

                echo "Run ${run_id} succeeded, but artifact '${artifact_name}' is not available yet; waiting ${POLL_INTERVAL_SECONDS}s..."
              else
                echo "Run ${run_id} is ${run_status}; waiting ${POLL_INTERVAL_SECONDS}s for artifact '${artifact_name}'..."
              fi
            fi

            if (( $(date +%s) >= deadline )); then
              if [[ -n "${requested_run_id}" ]]; then
                echo "Timed out waiting for run ${run_id} to complete successfully with artifact '${artifact_name}'." >&2
              else
                echo "Timed out waiting for a successful ${DEFAULT_WORKFLOW} run for ${REPO}@${DEFAULT_BRANCH} (${target_sha}) with artifact '${artifact_name}'." >&2
              fi
              exit 1
            fi

            sleep "${POLL_INTERVAL_SECONDS}"
          done

      - name: Guard existing release/tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists." >&2
            exit 1
          fi

          encoded_tag="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "${TAG}")"
          if gh api "/repos/${REPO}/git/ref/tags/${encoded_tag}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists." >&2
            exit 1
          fi

      - name: Download selected artifact
        run: |
          set -euo pipefail

          mkdir -p release-assets
          gh run download "${{ steps.resolve.outputs.run_id }}" \
            --repo "${REPO}" \
            --name "${{ steps.resolve.outputs.artifact_name }}" \
            --dir release-assets

          echo "Downloaded assets:"
          find release-assets -maxdepth 1 -type f -printf ' - %f\n'

      - name: Create GitHub release
        env:
          NOTES: ${{ inputs.notes }}
          PRERELEASE: ${{ inputs.prerelease }}
          RELEASE_NAME: ${{ inputs.release_name }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          title="${RELEASE_NAME:-${TAG}}"
          assets=(release-assets/*)

          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          args=(
            release create "${TAG}"
            --repo "${REPO}"
            --title "${title}"
            --target "${{ steps.resolve.outputs.head_sha }}"
          )

          if [[ "${PRERELEASE}" == "true" ]]; then
            args+=(--prerelease)
          fi

          if [[ -n "${NOTES}" ]]; then
            args+=(--notes "${NOTES}")
          else
            args+=(--generate-notes)
          fi

          args+=("${assets[@]}")

          gh "${args[@]}"

      - name: Summarize release
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          {
            echo "### Manual release published"
            echo
            echo "- Tag: \`${TAG}\`"
            echo "- Source run: ${{ steps.resolve.outputs.run_url }}"
            echo "- Source commit: \`${{ steps.resolve.outputs.head_sha }}\`"
            echo "- Artifact: \`${{ steps.resolve.outputs.artifact_name }}\`"
            echo "- Release: https://github.com/${REPO}/releases/tag/${TAG}"
          } >> "$GITHUB_STEP_SUMMARY"
